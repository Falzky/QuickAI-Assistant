<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickAI Config</title>
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        margin: 0;
        width: 600px; /* Perfect width for a Chrome Extension */
      }
    </style>
  </head>
  <body class="bg-gray-50 dark:bg-gray-800 transition-colors duration-200">
    <div
      class="container mx-auto p-6 bg-white dark:bg-gray-900 rounded-xl shadow-lg max-w-xl border border-gray-100 dark:border-gray-700"
    >
      <div class="mb-8 flex items-center justify-between">
        <div>
          <h2
            class="mb-1 text-3xl font-extrabold text-gray-900 dark:text-white"
          >
            <span
              class="text-transparent bg-clip-text bg-gradient-to-r to-emerald-600 from-sky-400"
              >QuickAI</span
            >
            Assistant
          </h2>
          <p class="text-sm font-normal text-gray-500 dark:text-gray-400">
            Configure your AI endpoints and API keys.
          </p>
        </div>
        <button
          id="toggleMode"
          class="p-2 rounded-lg border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors"
          title="Toggle Dark Mode"
        >
          <span class="text-xl">&#9728;</span>
        </button>
      </div>

      <div class="space-y-6">
        <div
          class="flex gap-4 opacity-50 cursor-not-allowed"
          title="GPT integration coming soon"
        >
          <div class="w-1/2">
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >GPT Endpoint</label
            >
            <input
              type="text"
              id="gptEndpoint"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-500"
              disabled
              placeholder="Not active"
            />
          </div>
          <div class="w-1/2">
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >GPT API Key</label
            >
            <input
              type="password"
              id="gptKey"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-500"
              disabled
              placeholder="Not active"
            />
          </div>
        </div>

        <div
          class="flex gap-4 p-4 border border-emerald-200 dark:border-emerald-800 rounded-lg bg-emerald-50/30 dark:bg-emerald-900/10"
        >
          <div class="w-1/2">
            <label
              for="geminiEndpoint"
              class="block text-sm font-medium text-gray-900 dark:text-white mb-1"
              >Gemini Endpoint <span class="text-emerald-500">*</span></label
            >
            <input
              type="text"
              id="geminiEndpoint"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-emerald-500 focus:border-emerald-500 dark:bg-gray-800 dark:border-gray-600 dark:text-white"
              placeholder="https://..."
            />
          </div>
          <div class="w-1/2">
            <label
              for="geminiKey"
              class="block text-sm font-medium text-gray-900 dark:text-white mb-1"
              >Gemini API Key <span class="text-emerald-500">*</span></label
            >
            <input
              type="password"
              id="geminiKey"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-emerald-500 focus:border-emerald-500 dark:bg-gray-800 dark:border-gray-600 dark:text-white"
              placeholder="AIzaSy..."
            />
          </div>
        </div>

        <div
          class="flex gap-4 opacity-50 cursor-not-allowed"
          title="Grok integration coming soon"
        >
          <div class="w-1/2">
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Grok Endpoint</label
            >
            <input
              type="text"
              id="grokEndpoint"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-500"
              disabled
              placeholder="Not active"
            />
          </div>
          <div class="w-1/2">
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Grok API Key</label
            >
            <input
              type="password"
              id="grokKey"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-500"
              disabled
              placeholder="Not active"
            />
          </div>
        </div>

        <div class="flex gap-4 items-end mt-4">
          <div class="w-1/2">
            <label
              for="toggle"
              class="block text-sm font-medium text-gray-900 dark:text-white mb-1"
              >Active AI Provider</label
            >
            <select
              id="toggle"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-emerald-500 focus:border-emerald-500 dark:bg-gray-800 dark:border-gray-600 dark:text-white cursor-pointer"
            >
              <option value="gemini">Google Gemini 3</option>
              <option value="gpt" disabled>OpenAI GPT (Coming Soon)</option>
              <option value="grok" disabled>xAI Grok (Coming Soon)</option>
            </select>
          </div>
          <div class="w-1/2 flex">
            <button
              id="saveButton"
              type="button"
              class="w-full text-gray-900 bg-gradient-to-r from-teal-200 to-lime-200 hover:bg-gradient-to-l focus:ring-4 focus:outline-none focus:ring-lime-200 font-bold rounded-lg text-lg px-5 py-2.5 shadow transition-all"
            >
              Save Settings
            </button>
          </div>
        </div>
      </div>

      <div
        class="mt-8 pt-5 border-t border-gray-200 dark:border-gray-700 flex justify-center"
      >
        <cite
          class="text-sm font-medium text-gray-500 dark:text-gray-400 not-italic tracking-wide"
        >
          Built with ❤️ by Fawaz
        </cite>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
